<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Data | P2V</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="settings">
    <div id="appNav"></div>

    <main class="settings-main">
      <section class="container section-block">
        <a href="admin.html" class="auth-back d-inline-flex mb-4">
          <i class="fa-solid fa-arrow-left me-2"></i>
          Back to admin dashb
        </a>

        <div id="loadingState" class="state-card text-center">
          <div class="spinner-border text-primary mb-3" role="status"></div>
          <p>Loading data...</p>
        </div>

        <div id="errorState" class="state-card error d-none">
          <h6 class="mb-2">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            Failed to load data
          </h6>
          <p id="errorText" class="mb-0">Please try again.</p>
        </div>

        <div id="emptyState" class="state-card text-center d-none">
          <i class="fa-regular fa-folder-open"></i>
          <h6 class="mt-2">No records found</h6>
        </div>

        <div id="dataState" class="d-none">
          <div class="state-card mb-4">
            <h1 class="settings-title mb-1" id="pageTitle">Records</h1>
            <p class="settings-muted mb-0" id="pageDescription">
              Database records from API.
            </p>
          </div>

          <div class="state-card">
            <div class="table-responsive">
              <table class="table table-dark table-striped table-borderless admin-data-table mb-0">
                <thead>
                  <tr id="tableHeadRow"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="appFooter"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin_data.js"></script>
  </body>
</html>
