<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | P2V</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/auth.css" />

    <script>
      if (!localStorage.getItem("p2v_token")) {
        window.location.href = "login.html";
      }
    </script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-pro sticky-top">
      <div class="container">
        <a href="index.html" class="navbar-brand brand">P2V</a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav nav-pro">
            <li class="nav-item">
              <a class="nav-link" href="index.html#home">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="index.html#places">Places</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="settings-main">
      <section class="container section-block">
        <div class="row justify-content-center">
          <div class="col-12 col-md-9 col-lg-7">
            <a href="index.html" class="auth-back d-inline-flex mb-4">
              <i class="fa-solid fa-arrow-left me-2"></i>
              Back to home
            </a>

            <!-- <div class="section-head">
              <h2>Account</h2>
            </div> -->
            <h1 class="settings-title">Account Settings</h1>

            <div id="loadingState" class="state-card text-center">
              <div class="spinner-border text-primary mb-3" role="status"></div>
              <p>Fetching your profile details...</p>
            </div>

            <div id="authenticatedState" style="display: none">
              <div class="state-card mb-4">
                <div class="d-flex align-items-center mb-4">
                  <div
                    class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm settings-avatar"
                  >
                    <i class="fa-solid fa-user fs-3"></i>
                  </div>
                  <div class="ms-3">
                    <h4 id="userName" class="fw-bold mb-0">User Name</h4>
                    <p id="userEmail" class="small mb-0 settings-muted">
                      email@example.com
                    </p>
                  </div>
                </div>

                <div class="settings-list">
                  <div class="settings-item">
                    <div>
                      <div class="fw-bold">Account Status</div>
                      <div class="small settings-muted">
                        Your membership level
                      </div>
                    </div>
                    <span class="settings-badge">Verified</span>
                  </div>

                  <div class="settings-item">
                    <div>
                      <div class="fw-bold">Security</div>
                      <div class="small settings-muted">JWT session active</div>
                    </div>
                    <i class="fa-solid fa-shield-halved text-primary"></i>
                  </div>
                </div>
              </div>

              <button onclick="logout()" class="danger-btn w-100">
                <i class="fa-solid fa-right-from-bracket me-2"></i>
                Logout
              </button>
            </div>

            <div id="errorState" class="state-card error" style="display: none">
              <i class="fa-solid fa-circle-exclamation me-2"></i>
              Session expired or server error. Please login again.
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer-pro">
      <div class="container">
        <div class="footer-bottom justify-content-center">
          <span>© 2026 P2V</span>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
  </body>
</html>
