<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | P2V</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="settings">
    <div id="appNav"></div>

    <main class="settings-main">
      <section class="container section-block">
        <a href="settings.html" class="auth-back d-inline-flex mb-4">
          <i class="fa-solid fa-arrow-left me-2"></i>
          Back to settings
        </a>

        <div id="loadingState" class="state-card text-center">
          <div class="spinner-border text-primary mb-3" role="status"></div>
          <p>Checking admin access...</p>
        </div>

        <div id="errorState" class="state-card error d-none">
          <i class="fa-solid fa-circle-exclamation me-2"></i>
          You do not have access to this page.
        </div>

        <div id="adminState" class="d-none">
          <div class="state-card mb-4">
            <h1 class="settings-title mb-2">P2V Admin</h1>
            <p class="settings-muted mb-0">
              Logged in as <strong id="roleDisplay">-</strong>. Use the links below to manage data.
            </p>
          </div>

          <div class="state-card">
            <h5 class="mb-3">App Models</h5>
            <div class="table-responsive">
              <table class="table table-dark table-borderless align-middle mb-0 admin-model-table">
                <thead>
                  <tr>
                    <th>App</th>
                    <th>Model</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="adminModelBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="appFooter"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
