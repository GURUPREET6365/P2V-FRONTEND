<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Votes | P2V</title>
    <meta
      name="description"
      content="Admin interface for monitoring and managing vote data in P2V."
    />
    <meta name="author" content="P2V" />
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
    <meta name="theme-color" content="#f4f8ff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="/admin_votes.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="P2V" />
    <meta property="og:title" content="Admin Votes | P2V" />
    <meta
      property="og:description"
      content="Restricted vote administration page on P2V."
    />
    <meta property="og:url" content="/admin_votes.html" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Admin Votes | P2V" />
    <meta name="twitter:description" content="Restricted vote management page on P2V." />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="settings">
    <div id="appNav"></div>

    <main class="settings-main">
      <section class="container section-block">
        <a href="admin.html" class="auth-back d-inline-flex mb-4">
          <i class="fa-solid fa-arrow-left me-2"></i>
          Back to admin dashboard
        </a>

        <div id="loadingState" class="state-card text-center">
          <div class="spinner-border text-primary mb-3" role="status"></div>
          <p>Loading votes...</p>
        </div>

        <div id="errorState" class="state-card error d-none">
          <h6 class="mb-2">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            Failed to load votes
          </h6>
          <p id="errorText" class="mb-0">Please try again.</p>
        </div>

        <div id="dataState" class="d-none">
          <div class="state-card mb-4">
            <h1 class="settings-title mb-1">Votes</h1>
            <p class="settings-muted mb-0">
              Managed from <code>/api/admin/votes</code>.
            </p>
            <p class="settings-muted mb-0 mt-1">
              Total votes: <strong id="voteCount">0</strong>
            </p>
          </div>

          <div id="emptyState" class="state-card text-center d-none">
            <i class="fa-regular fa-folder-open"></i>
            <h6 class="mt-2">No votes found</h6>
          </div>

          <div id="votesWrap" class="state-card">
            <div id="votesList" class="admin-places-list"></div>
          </div>
        </div>
      </section>
    </main>

    <div id="appFooter"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin_votes.js"></script>
  </body>
</html>
