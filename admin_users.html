<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Users | PlaceExplorer</title>
    <meta
      name="description"
      content="Admin interface for managing user accounts and related data in PlaceExplorer."
    />
    <meta name="author" content="PlaceExplorer" />
    <meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
    <meta name="theme-color" content="#f4f8ff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="/admin_users.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PlaceExplorer" />
    <meta property="og:title" content="Admin Users | PlaceExplorer" />
    <meta
      property="og:description"
      content="Restricted page for user administration on PlaceExplorer."
    />
    <meta property="og:url" content="/admin_users.html" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Admin Users | PlaceExplorer" />
    <meta name="twitter:description" content="Restricted user management page on PlaceExplorer." />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body data-page="settings">
    <div id="appNav"></div>

    <main class="settings-main">
      <section class="container section-block">
        <a href="admin.html" class="auth-back d-inline-flex mb-4">
          <i class="fa-solid fa-arrow-left me-2"></i>
          Back to admin dashboard
        </a>

        <div id="loadingState" class="state-card text-center">
          <div class="spinner-border text-primary mb-3" role="status"></div>
          <p>Loading users...</p>
        </div>

        <div id="errorState" class="state-card error d-none">
          <h6 class="mb-2">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            Failed to load users
          </h6>
          <p id="errorText" class="mb-0">Please try again.</p>
        </div>

        <div id="dataState" class="d-none">
          <div class="state-card mb-4">
            <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
              <div>
                <h1 class="settings-title mb-1">Users</h1>
                <p class="settings-muted mb-0">
                  Managed from <code>/api/admin/user</code>.
                </p>
                <p class="settings-muted mb-0 mt-1">
                  Total users: <strong id="userCount">0</strong>
                </p>
              </div>
              <button class="cta-primary border-0" data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="fa-solid fa-user-plus me-2"></i>
                Add User
              </button>
            </div>

            <div class="places-search-wrap mt-3 mb-0">
              <div class="input-group places-search-group">
                <span class="input-group-text">
                  <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input
                  id="adminUserSearchInput"
                  type="search"
                  class="form-control"
                  placeholder="Search users by name, email, or role"
                  aria-label="Search admin users"
                />
                <button id="adminUserSearchClear" class="btn btn-outline-light" type="button">
                  Clear
                </button>
              </div>
              <p id="adminUserSearchMeta" class="places-search-meta mb-0"></p>
            </div>
          </div>

          <div id="emptyState" class="state-card text-center d-none">
            <i class="fa-regular fa-folder-open"></i>
            <h6 class="mt-2">No users found</h6>
          </div>

          <div id="usersWrap" class="state-card">
            <div id="usersList" class="admin-places-list"></div>
          </div>
        </div>
      </section>
    </main>

    <div id="appFooter"></div>

    <div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-white border border-secondary-subtle">
          <div class="modal-header border-secondary-subtle">
            <h5 class="modal-title">Add User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="addUserForm">
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">First Name</label>
                <input id="addUserFirstName" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input id="addUserLastName" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="addUserEmail" type="email" class="form-control" required />
              </div>
              <div class="mb-0">
                <label class="form-label">Password</label>
                <input id="addUserPassword" type="password" class="form-control" required />
              </div>
            </div>
            <div class="modal-footer border-secondary-subtle">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Create User</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-white border border-secondary-subtle">
          <div class="modal-header border-secondary-subtle">
            <h5 class="modal-title">Edit User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <form id="editUserForm">
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">First Name</label>
                <input id="editUserFirstName" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input id="editUserLastName" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="editUserEmail" type="email" class="form-control" required />
              </div>
              <div class="mb-0">
                <label class="form-label">Password</label>
                <input id="editUserPassword" type="password" class="form-control" required />
              </div>
            </div>
            <div class="modal-footer border-secondary-subtle">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Update User</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin_users.js"></script>
  </body>
</html>
