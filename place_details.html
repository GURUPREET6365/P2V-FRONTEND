<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Place Details | Ratings and Insights on P2V</title>
    <meta
      name="description"
      content="View detailed place information, category ratings, and community interactions for informed travel choices."
    />
    <meta
      name="keywords"
      content="place details, place ratings, travel insights, community reviews, P2V"
    />
    <meta name="author" content="P2V" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="/place_details.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="P2V" />
    <meta property="og:title" content="Place Details | Ratings and Insights on P2V" />
    <meta
      property="og:description"
      content="Explore complete place details, voting data, and category-level ratings on P2V."
    />
    <meta property="og:url" content="/place_details.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Place Details | Ratings and Insights on P2V" />
    <meta
      name="twitter:description"
      content="Check full place insights and user ratings before you decide where to visit."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/place_details.css" />
  </head>

  <body data-page="places">
    <div id="appNav"></div>

    <main>
      <section class="container section-block">
        <a href="places.html" class="cta-primary cta-secondary d-inline-flex align-items-center mb-4">
          <i class="fa-solid fa-arrow-left me-2"></i>
          Back to places
        </a>

        <div id="loadingState" class="state-card text-center">
          <div class="spinner-border text-primary mb-3" role="status"></div>
          <p>Loading place details...</p>
        </div>

        <div id="errorState" class="state-card error d-none">
          <h5 class="mb-2">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            Unable to load place details
          </h5>
          <p id="errorMessage" class="mb-0">
            Please retry after a moment.
          </p>
        </div>

        <div id="detailsState" class="d-none">
          <article class="state-card place-details-card">
            <h1 id="placeName" class="place-detail-title mb-3">Place</h1>

            <div class="place-actions details-actions">
              <button id="likeBtn" class="vote-btn like" type="button">
                <i class="fa-regular fa-thumbs-up"></i> Like
              </button>
              <button id="dislikeBtn" class="vote-btn dislike" type="button">
                <i class="fa-regular fa-thumbs-down"></i> Dislike
              </button>
              <button id="rateBtn" class="place-rate-btn" type="button">
                <i class="fa-regular fa-star"></i> Rate
              </button>
            </div>

            <div class="notes-shell mt-4">
              <h5 class="notes-title"><strong>Place Details:</strong></h5>
              <div id="placeNotes" class="notes-list"></div>
            </div>

            <div class="notes-shell mt-4">
              <h5 class="notes-title"><strong>7 Category Ratings:</strong></h5>
              <p id="totalUserRatedText" class="settings-muted mb-2"></p>
              <div id="categoryRatings" class="category-ratings-list"></div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <div
      class="modal fade"
      id="ratingModal"
      tabindex="-1"
      aria-labelledby="ratingModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-dark text-light border border-secondary-subtle">
          <div class="modal-header">
            <h5 class="modal-title" id="ratingModalLabel">Rate this place</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="ratingModalForm" novalidate>
            <div class="modal-body" id="ratingModalBody"></div>
            <div class="modal-footer">
              <p id="ratingModalFeedback" class="rating-feedback mb-0 me-auto" aria-live="polite"></p>
              <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary btn-sm">Submit Rating</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="appFooter"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/place_details.js"></script>
  </body>
</html>
