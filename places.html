<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Places | Explore Featured Destinations on PlaceExplorer</title>
    <meta
      name="description"
      content="Browse featured places with clear details, ratings, likes, and community feedback to make faster travel decisions."
    />
    <meta
      name="keywords"
      content="places listing, featured places, travel recommendations, place ratings, PlaceExplorer"
    />
    <meta name="author" content="PlaceExplorer" />
    <meta name="application-name" content="PlaceExplorer" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#f4f8ff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="canonical" href="https://place-2-visit-production.up.railway.app/places.html" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="PlaceExplorer" />
    <meta property="og:title" content="Places | Explore Featured Destinations on PlaceExplorer" />
    <meta
      property="og:description"
      content="Discover places with practical information, category ratings, and community voting on PlaceExplorer."
    />
    <meta property="og:url" content="https://place-2-visit-production.up.railway.app/places.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Places | Explore Featured Destinations on PlaceExplorer" />
    <meta
      name="twitter:description"
      content="Explore high-signal place recommendations with transparent ratings and user feedback."
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "Places",
        "url": "https://place-2-visit-production.up.railway.app/places.html",
        "description": "Browse featured places with practical details, ratings, and community voting on PlaceExplorer.",
        "isPartOf": {
          "@type": "WebSite",
          "name": "PlaceExplorer",
          "url": "https://place-2-visit-production.up.railway.app/"
        }
      }
    </script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body data-page="places">
    <div id="appNav"></div>

    <header class="hero hero-sm">
      <div class="container text-center">
        <h1 class="hero-title">Explore <span>Featured Places</span></h1>
        <p class="hero-sub">
          Discover community-submitted places with practical details.
        </p>
      </div>
    </header>

    <section class="container section-block" id="places">
      <div class="section-head">
        <h2>Places Feed</h2>
      </div>

      <div class="places-search-wrap">
        <div class="input-group places-search-group">
          <span class="input-group-text">
            <i class="fa-solid fa-magnifying-glass"></i>
          </span>
          <input
            id="placesSearchInput"
            type="search"
            class="form-control"
            placeholder="Search by place name, address, or pincode"
            aria-label="Search places"
          />
          <button id="placesSearchClear" class="btn btn-outline-light" type="button">
            Clear
          </button>
        </div>
        <p id="placesSearchMeta" class="places-search-meta mb-0"></p>
      </div>

      <div id="loadingState" class="state-card text-center">
        <div class="spinner-border text-primary"></div>
        <p>Searching for places...</p>
      </div>

      <div
        id="errorState"
        class="state-card error text-center"
        style="display: none"
      >
        <i class="fa-solid fa-circle-exclamation"></i>
        <h6>Connection Error</h6>
        <p>Unable to reach server</p>
      </div>

      <div id="emptyState" class="state-card text-center" style="display: none">
        <i class="fa-regular fa-folder-open"></i>
        <h6 class="mt-2">No places found</h6>
        <p class="mb-0">Create the first place and refresh this page.</p>
      </div>

      <div class="row g-4" id="placesGrid" style="display: none"></div>
    </section>

    <div
      class="modal fade"
      id="ratingModal"
      tabindex="-1"
      aria-labelledby="ratingModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-white text-dark border border-secondary-subtle">
          <div class="modal-header">
            <h5 class="modal-title" id="ratingModalLabel">Rate this place</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="ratingModalForm" novalidate>
            <div class="modal-body" id="ratingModalBody"></div>
            <div class="modal-footer">
              <p id="ratingModalFeedback" class="rating-feedback mb-0 me-auto" aria-live="polite"></p>
              <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary btn-sm">Submit Rating</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="appFooter"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/places.js"></script>
  </body>
</html>
